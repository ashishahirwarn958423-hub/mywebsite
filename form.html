<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संपर्क हेतु पंजीकरण फ़ॉर्म</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px; /* मोबाइल पर किनारों से जगह छोड़ने के लिए */
        }

        .form-container {
            background-color: #ffffff;
            padding: 35px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 950px; /* डेस्कटॉप पर अच्छी चौड़ाई */
            border-top: 6px solid #2563eb;
            transition: all 0.3s ease;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
        }

        /* मुख्य ग्रिड - नाम और मोबाइल के लिए */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* लोकेशन सेक्शन ग्रिड - चारों बॉक्स एक लाइन में */
        .location-section {
            grid-column: span 2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            border-top: 2px dashed #e2e8f0;
            padding-top: 25px;
            margin-top: 10px;
        }

        .location-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        label span {
            color: #ef4444;
        }

        /* इनपुट और ड्रॉपडाउन की बेहतरीन स्टाइल */
        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 14px 16px; /* मोबाइल फ्रेंडली बड़ी टैप साइज */
            font-size: 15px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
            transition: all 0.3s ease;
            -webkit-appearance: none; /* iOS सफारी पर ओरिजिनल लुक के लिए */
        }

        input:focus,
        select:focus {
            border-color: #2563eb;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        /* बटन कंटेनर */
        .btn-container {
            text-align: center;
            grid-column: span 2;
            margin-top: 20px;
        }

        /* बड़ा और साफ़ दिखने वाला बटन */
        .submit-btn {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 16px 60px; /* बड़ा बटन ताकि मोबाइल पर भी अच्छे से दबे */
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            width: auto;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
        }

        /* ======================================================= */
        /* मोबाइल और टैबलेट के लिए रेस्पॉन्सिव सेटिंग्स (Media Queries) */
        /* ======================================================= */
        
        /* टैबलेट स्क्रीन के लिए (जब चौड़ाई 850px से कम हो) */
        @media (max-width: 850px) {
            .location-section {
                grid-template-columns: repeat(2, 1fr); /* 2-2 बॉक्स की दो लाइनें बन जाएंगी */
            }
        }

        /* मोबाइल स्क्रीन के लिए (जब चौड़ाई 600px से कम हो) */
        @media (max-width: 600px) {
            .form-container {
                padding: 25px 20px; /* मोबाइल पर अंदर की स्पेस थोड़ी कम */
            }
            h2 {
                font-size: 22px; /* मोबाइल पर थोड़ी छोटी हेडिंग */
            }
            .form-grid { 
                grid-template-columns: 1fr; /* नाम और मोबाइल एक के नीचे एक */
            }
            .location-section { 
                grid-column: span 1; 
                grid-template-columns: 1fr; /* चारों ड्रॉपडाउन एक के नीचे एक */
                gap: 18px;
            }
            .btn-container { 
                grid-column: span 1; 
            }
            .submit-btn {
                width: 100%; /* मोबाइल स्क्रीन पर बटन पूरा बड़ा (Full Width) हो जाएगा */
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>संपर्क हेतु पंजीकरण फ़ॉर्म</h2>
    
    <form action="https://script.google.com/macros/s/AKfycbx2A6fj2f5n_IkltQ0Vd31NLNU5TtWbQCyi5yvrMhYYQL8M4uu4qbrMsiKLcmmCIuER/exec" method="POST">
        <div class="form-grid">
            
            <div class="form-group">
                <label for="fullname">पूरा नाम (Full Name) <span>*</span></label>
                <input type="text" id="fullname" name="fullname" placeholder="अपना नाम दर्ज करें" required>
            </div>

            <div class="form-group">
                <label for="mobile">मोबाइल नंबर (Mobile Number) <span>*</span></label>
                <input type="tel" id="mobile" name="mobile" placeholder="10 अंकों का नंबर" pattern="[0-9]{10}" required>
            </div>

            <div class="location-section">
                
                <div class="location-group">
                    <label for="state">राज्य (State) <span>*</span></label>
                    <select id="state" name="state" required onchange="loadDistricts()">
                        <option value="" disabled selected>लोड हो रहा है...</option>
                    </select>
                </div>

                <div class="location-group">
                    <label for="district">जिला (District) <span>*</span></label>
                    <select id="district" name="district" required onchange="loadTehsils()" disabled>
                        <option value="" disabled selected>पहले राज्य चुनें</option>
                    </select>
                </div>

                <div class="location-group">
                    <label for="tehsil">तहसील (Tehsil) <span>*</span></label>
                    <select id="tehsil" name="tehsil" required onchange="loadVillages()" disabled>
                        <option value="" disabled selected>पहले जिला चुनें</option>
                    </select>
                </div>

                <div class="location-group">
                    <label for="village">गाँव (Village) <span>*</span></label>
                    <select id="village" name="village" required disabled>
                        <option value="" disabled selected>पहले तहसील चुनें</option>
                    </select>
                </div>

            </div>

            <div class="btn-container">
                <button type="submit" class="submit-btn">जानकारी सबमिट करें</button>
            </div>

        </div>
    </form>
</div>

<script>
    // विदिशा की सभी 11 तहसीलें और बासौदा के मुख्य गाँव का डेटा
    const vidishaTehsilsData = {
        "ganjbasoda": ["उहार (Uhar)", "बरेठ (Bareth)", "नौलखी (Naulakhi)", "त्योंदा", "बागरोद", "ग्यारसपुर", "हंडिया", "भानपुर", "करैया", "पचमा", "सिरोंज रोड", "राठौर", "बरोदिया"],
        "vidisha": ["पमारिया", "अहमदपुर", "ढोलखेड़ी", "जलालपुर"],
        "sironj": ["दीपनाकला", "इशाकपुर", "कजराइल"],
        "kurwai": ["बरोदिया", "भोरासा", "मंडीबामोरा"],
        "lateri": ["झूकरयागी", "अलीगंज"],
        "gyaraspur": ["हैदरगढ़", "मानोरा"],
        "nateran": ["शमशाबाद", "बैरसिया"],
        "gulabganj": ["गुलाबगंज मुख्य", "पिपलधार"],
        "shamsabad": ["शमशाबाद टाउन", "काकसा"],
        "tyonda": ["त्योंदा खास", "बागरोद तिराहा"],
        "pathari": ["पठारी स्टेशन", "हंसुआ"]
    };

    // 1. ऑल इंडिया राज्य लोड करना (API से)
    document.addEventListener("DOMContentLoaded", () => {
        const stateSelect = document.getElementById("state");
        fetch("https://api.rootnet.in/covid19-in/stats/latest")
            .then(response => response.json())
            .then(data => {
                stateSelect.innerHTML = '<option value="" disabled selected>राज्य चुनें</option>';
                const regionalData = data.data.regional;
                regionalData.sort((a, b) => a.loc.localeCompare(b.loc));
                regionalData.forEach(state => {
                    const option = document.createElement("option");
                    option.value = state.loc;
                    option.textContent = state.loc;
                    stateSelect.appendChild(option);
                });
            })
            .catch(() => {
                stateSelect.innerHTML = '<option value="" disabled selected>इंटरनेट चेक करें</option>';
            });
    });

    // 2. राज्य चुनने पर जिले लोड करना (API से)
    function loadDistricts() {
        const stateName = document.getElementById("state").value;
        const districtSelect = document.getElementById("district");
        const tehsilSelect = document.getElementById("tehsil");
        const villageSelect = document.getElementById("village");

        districtSelect.innerHTML = '<option value="" disabled selected>लोड़ हो रहा है...</option>';
        tehsilSelect.innerHTML = '<option value="" disabled selected>पहले जिला चुनें</option>';
        villageSelect.innerHTML = '<option value="" disabled selected>पहले तहसील चुनें</option>';
        tehsilSelect.disabled = true;
        villageSelect.disabled = true;

        fetch("https://raw.githubusercontent.com/sab99r/Indian-States-And-Districts/master/states-and-districts.json")
            .then(response => response.json())
            .then(data => {
                districtSelect.innerHTML = '<option value="" disabled selected>जिला चुनें</option>';
                districtSelect.disabled = false;

                const stateData = data.states.find(s => s.state.toLowerCase() === stateName.toLowerCase() || (stateName === "Madhya Pradesh" && s.state === "Madhya Pradesh"));
                
                if (stateData && stateData.districts) {
                    stateData.districts.sort().forEach(dist => {
                        const option = document.createElement("option");
                        option.value = dist.toLowerCase();
                        option.textContent = dist;
                        districtSelect.appendChild(option);
                    });
                } else if(stateName.includes("Madhya") || stateName === "Madhya Pradesh") {
                    const mpDistricts = ["Vidisha", "Bhopal", "Indore", "Gwalior", "Jabalpur", "Sagar", "Raisen", "Sehore"];
                    mpDistricts.sort().forEach(dist => {
                        const option = document.createElement("option");
                        option.value = dist.toLowerCase();
                        option.textContent = dist;
                        districtSelect.appendChild(option);
                    });
                }
            });
    }

    // 3. जिला चुनने पर तहसील लोड करना
    function loadTehsils() {
        const districtVal = document.getElementById("district").value;
        const tehsilSelect = document.getElementById("tehsil");
        const villageSelect = document.getElementById("village");

        tehsilSelect.innerHTML = '<option value="" disabled selected>तहसील चुनें</option>';
        villageSelect.innerHTML = '<option value="" disabled selected>पहले तहसील चुनें</option>';
        villageSelect.disabled = true;

        if (districtVal === "vidisha") {
            tehsilSelect.disabled = false;
            Object.keys(vidishaTehsilsData).forEach(tehsil => {
                const option = document.createElement("option");
                option.value = tehsil;
                let hindiName = tehsil.charAt(0).toUpperCase() + tehsil.slice(1);
                if(tehsil === "ganjbasoda") hindiName = "Ganj Basoda (गंजबासौदा)";
                if(tehsil === "gulabganj") hindiName = "Gulabganj (गुलाबगंज)";
                if(tehsil === "shamsabad") hindiName = "Shamsabad (शमशाबाद)";
                if(tehsil === "tyonda") hindiName = "Tyonda (त्योंदा)";
                if(tehsil === "pathari") hindiName = "Pathari (पठारी)";
                
                option.textContent = hindiName;
                tehsilSelect.appendChild(option);
            });
        } else {
            tehsilSelect.disabled = false;
            ["तहसील-1", "तहसील-2"].forEach(t => {
                const option = document.createElement("option");
                option.value = t;
                option.textContent = t;
                tehsilSelect.appendChild(option);
            });
        }
    }

    // 4. तहसील चुनने पर गाँव लोड करना
    function loadVillages() {
        const tehsilVal = document.getElementById("tehsil").value;
        const villageSelect = document.getElementById("village");

        villageSelect.innerHTML = '<option value="" disabled selected>गाँव चुनें</option>';
        villageSelect.disabled = false;

        if (vidishaTehsilsData[tehsilVal]) {
            vidishaTehsilsData[tehsilVal].forEach(village => {
                const option = document.createElement("option");
                option.value = village.toLowerCase();
                option.textContent = village;
                villageSelect.appendChild(option);
            });
        } else {
            ["मुख्य गाँव", "अन्य क्षेत्र"].forEach(v => {
                const option = document.createElement("option");
                option.value = v;
                option.textContent = v;
                villageSelect.appendChild(option);
            });
        }
    }
</script>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault(); // फॉर्म को डायरेक्ट सबमिट होने से रोकें

    const formData = new FormData(this);
    const data = {};
    
    // फॉर्म के सारे डेटा को JSON ऑब्जेक्ट में बदलें
    formData.forEach((value, key) => {
        data[key] = value;
    });

    const actionUrl = this.getAttribute('action');

    // डेटा को JSON फॉर्मेट में Google Apps Script पर भेजें
    fetch(actionUrl, {
        method: 'POST',
         
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(() => {
        alert('डेटा सफलतापूर्वक भेज दिया गया है!');
        this.reset(); // फॉर्म को खाली करने के लिए
    })
    .catch(error => {
        console.error('Error:', error);
        alert('कुछ गड़बड़ हुई, कृपया दोबारा प्रयास करें।');
    });
});
</script>
</body>
</html>
